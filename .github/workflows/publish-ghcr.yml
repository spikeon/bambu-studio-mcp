name: Publish container images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ghcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR must be lowercase)
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=ghcr.io/${OWNER_LC}/bambu-studio-mcp" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slicer (Bambu Studio CLI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_BASE }}:latest

      - name: Build and push MCP runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          build-args: |
            SLICER_IMAGE=${{ env.IMAGE_BASE }}:latest
          tags: ${{ env.IMAGE_BASE }}:mcp
