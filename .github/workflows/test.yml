name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Unit tests
        run: npm run test

      - name: Build Bambu Studio Docker image
        run: docker build -t bambu-studio-mcp:ci .

      - name: E2E (Vitest + Docker)
        env:
          BAMBU_E2E_IMAGE: bambu-studio-mcp:ci
          BAMBU_E2E_DOCKER_TIMEOUT: "900"
        run: npm run test:e2e

  publish-ghcr:
    needs: unit-and-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR must be lowercase)
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=ghcr.io/${OWNER_LC}/bambu-studio-mcp" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slicer (Bambu Studio CLI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_BASE }}:latest

      - name: Build and push MCP runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          build-args: |
            SLICER_IMAGE=${{ env.IMAGE_BASE }}:latest
          tags: ${{ env.IMAGE_BASE }}:mcp
